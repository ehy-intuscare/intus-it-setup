<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Intus Care — IT Setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

<!--
  ============================================================================
   HOW TO ADD YOUR SCREENSHOTS  (read me!)
  ============================================================================
  1. In this GitHub repo, create a folder called:  images
  2. Upload your screenshots into that folder, naming each file EXACTLY as
     listed below (PNG or JPG both fine).
  3. That's it — the picture will appear automatically. Until a file exists,
     you'll see a dashed grey "IMAGE" box on the page telling you what goes there.

  The 13 image files this page looks for (each is also marked inline below
  with a big  >>> IMAGE ##  comment so you can find the exact spot):

     images/01-intuscare-logo.png       Welcome screen — IntusCare logo
     images/04-macbook.png              Laptop password intro — MacBook photo
     images/07-mac-users-groups.png     Mac password — System Settings screenshot
     images/07-windows-password.png     Windows password — change-password screenshot
     images/12-1password-logo.png       1Password intro — 1Password logo
     images/16-chrome-settings.png      Chrome — password settings screenshot
     images/19-nordlayer-orgid.png      NordLayer — Organization ID screenshot
     images/20-entra-id.png             NordLayer login — Entra ID button
     images/21-slack-logo.png           Slack intro — Slack logo
     images/22-m365-launcher-slack.png  Slack — M365 app launcher (arrow to Slack)
     images/26-atlassian-login.png      Atlassian — login screenshot
     images/27-airtable-sso.png         Airtable — SSO sign-in screenshot
     images/28-outlook-launcher.png     Accessing via M365 — Outlook app launcher

  To change ANY wording, scroll to the STEPS list further down and edit the
  text between the quotes. To change support contacts, edit the CONFIG block.
  ============================================================================
-->

<style>
  :root{
    --blue:#1f6feb; --blue-press:#175fd0;
    --navy:#0b2a5b; --wash:#eaf2ff; --canvas:#fff;
    --ink:#132339; --muted:#5a6b85; --border:#e3eaf5;
    --green:#16a34a; --radius:14px; --maxw:660px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:"Inter",system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(120% 90% at 100% 0%, var(--wash) 0%, rgba(234,242,255,0) 55%),var(--canvas);
    -webkit-font-smoothing:antialiased}
  h1,h2{font-family:"Space Grotesk",system-ui,sans-serif;color:var(--navy);letter-spacing:-.01em;line-height:1.18;margin:0}

  /* top progress + section bar */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:20;background:rgba(255,255,255,.9);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
  .progress{height:4px;background:var(--border)}
  .progress > i{display:block;height:100%;background:var(--blue);width:0;transition:width .35s ease}
  .eyebrow{display:flex;align-items:center;gap:10px;height:46px;padding:0 24px;font-size:14px;font-weight:600;color:var(--muted)}
  .eyebrow .num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;
    border-radius:6px;background:var(--navy);color:#fff;font-size:12px}
  .eyebrow.hidden{display:none}

  /* stage / card */
  .stage{min-height:100%;display:flex;align-items:center;justify-content:center;padding:110px 24px 90px}
  .card{width:100%;max-width:var(--maxw);opacity:0;transform:translateY(10px);animation:rise .38s ease forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.card{animation:none;opacity:1;transform:none}}

  .cover-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;
    border-radius:7px;background:var(--blue);color:#fff;font-size:13px;font-weight:600;
    font-family:"Space Grotesk";margin-right:10px;vertical-align:6px}
  .card h1{font-size:33px;margin-bottom:16px}
  .card h2{font-size:25px;margin-bottom:14px}
  .body{font-size:17px;line-height:1.6}
  .body p{margin:0 0 13px}
  .body strong{color:var(--navy)}
  .body a{color:var(--blue);text-underline-offset:3px}
  .body ol,.body ul{margin:0 0 13px;padding-left:22px;line-height:1.7}
  .body .links a{display:block;margin:8px 0}
  .note{background:var(--wash);border:1px solid var(--border);border-radius:12px;padding:13px 15px;
    font-size:15px;color:var(--muted);margin:2px 0 15px}
  .mono{font-family:"Space Grotesk";background:#0b2a5b;color:#dbe7ff;border-radius:10px;
    padding:4px 9px;font-size:14px;display:inline-block}

  /* IMAGE SLOTS */
  .shotwrap{margin:20px 0 6px}
  .shot{display:block;width:100%;max-width:560px;border-radius:12px;border:1px solid var(--border)}
  .shot-ph{width:100%;max-width:560px;min-height:190px;border:2px dashed #b9c8e6;border-radius:12px;
    background:#f5f9ff;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:#5876b0;font-weight:600;font-size:15px;padding:22px;gap:6px}
  .shot-ph small{font-weight:500;color:#8598bd;font-size:12.5px}
  .shot-ph code{background:#e5edfb;padding:2px 7px;border-radius:5px;color:#2c4f8f}
  .shot-ph .cam{font-size:26px}

  /* buttons */
  .actions{margin-top:26px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .btn{font-family:"Inter";font-weight:600;font-size:16px;border:0;border-radius:10px;
    padding:12px 22px;cursor:pointer;background:var(--blue);color:#fff;transition:background .15s,transform .05s}
  .btn:hover{background:var(--blue-press)} .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:3px solid #9cc4ff;outline-offset:2px}
  .btn.back{background:transparent;color:var(--muted);padding:12px 10px}
  .btn.back:hover{background:#f0f4fb;color:var(--navy)}
  .btn.back.hidden{display:none}

  .opts{display:flex;flex-direction:column;gap:10px;width:100%;max-width:440px;margin-top:22px}
  .opt{display:flex;align-items:center;gap:12px;text-align:left;background:#fff;border:1.5px solid var(--border);
    border-radius:12px;padding:13px 15px;font-family:"Inter";font-size:16px;color:var(--navy);cursor:pointer;transition:.15s}
  .opt:hover{border-color:var(--blue);background:#f5f9ff}
  .opt:focus-visible{outline:3px solid #9cc4ff;outline-offset:2px}
  .opt .key{flex:none;width:24px;height:24px;border-radius:6px;background:var(--navy);color:#fff;
    font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center}
  .opt.ghost{border-style:dashed;color:var(--muted)} .opt.ghost .key{background:var(--muted)}
  .hint{font-size:13px;color:var(--muted);margin-top:14px}
  kbd{background:#fff;border:1px solid var(--border);border-bottom-width:2px;border-radius:6px;padding:1px 7px;font-size:12px}

  /* help modal */
  .overlay{position:fixed;inset:0;background:rgba(11,42,91,.45);display:none;align-items:center;justify-content:center;z-index:30;padding:24px}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:16px;max-width:430px;width:100%;padding:26px}
  .modal h2{font-size:20px;margin-bottom:12px}
  .modal p{font-size:15px;line-height:1.6;margin:0 0 10px}

  .done-check{width:60px;height:60px;border-radius:50%;background:var(--green);
    display:flex;align-items:center;justify-content:center;margin-bottom:20px}
  .done-check svg{width:30px;height:30px}

  @media (max-width:560px){.card h1{font-size:27px}.stage{padding:100px 18px 80px}}
</style>
</head>
<body>
  <div class="topbar">
    <div class="progress"><i id="bar"></i></div>
    <div class="eyebrow" id="eyebrow"></div>
  </div>

  <div class="stage"><div class="card" id="card"></div></div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>Need a hand?</h2>
      <p>Reach the IT helpdesk any time:</p>
      <p><strong>Email:</strong> <a id="mMail" href="#"></a><br>
         <strong>Slack:</strong> <span id="mSlack"></span></p>
      <button class="btn" onclick="document.getElementById('overlay').classList.remove('open')">Got it</button>
    </div>
  </div>

<script>
/* ============================================================
   CONFIG — edit support contacts here
   ============================================================ */
const CONFIG = {
  helpdeskEmail: "it@intuscare.atlassian.net",
  helpdeskSlack: "#it-support"
};

/* ============================================================
   STEPS — the whole flow, in order. Edit text freely.
   Fields:
     id        unique name
     section   1–6, or null for the Day-2 transition screens (no number)
     secTitle  short label shown in the top bar
     cover     true = section "cover" screen (big number by the heading, no top bar)
     heading   the H1/H2 text
     body      the paragraph HTML
     img       { file, label }  -> renders an image slot (see HOW TO ADD IMAGES up top)
     cta       label for the Continue button (default "Continue")
     choices   A/B buttons instead of Continue:
                 {key,label,action:'advance'|'help'|'goto', to?}
     continueTo forces where Continue/advance goes (used for the Mac/Windows branch)
     submit    true = final screen (Continue becomes "Submit")
   ============================================================ */
const STEPS = [

  /* ---------- INTRO ---------- */
  { id:"welcome", heading:"Welcome! Day one begins here.", h:1,
    img:{file:"01-intuscare-logo.png", label:"IntusCare logo"},
    body:`<p>Before onboarding can really kick off, we'll set up your Intus laptop with some essential communication and collaboration tools. This guide will take you step-by-step through the activation process for everything you need.</p>
          <p>Please complete all steps to ensure your work laptop is set up properly and you'll be equipped for the upcoming onboarding activities.</p>`,
    cta:"I'm ready!" },

  { id:"support", heading:"Meet your IT support",
    body:`<p>Our IT helpdesk manages your tech and supports all Intus staff.</p>
          <p><strong>If you run into any difficulty with the steps in this guide, IT is here to help.</strong></p>
          <p>For software access, logins, or questions, email <a href="mailto:${CONFIG.helpdeskEmail}">${CONFIG.helpdeskEmail}</a> or message us on Slack at <strong>${CONFIG.helpdeskSlack}</strong>.</p>`,
    cta:"Got it!" },

  { id:"overview", heading:"Here are the accounts and apps we need to set up.",
    body:`<p>These are logins &amp; tools that Intus uses every day. Later, we'll bring in more job-specific tools you may need.</p>
          <p>Your account set up will take place over two days, with the schedule outlined below:</p>
          <p><strong>Day one</strong></p>
          <ol><li><strong>New laptop password</strong></li>
              <li><strong>Your company Microsoft account</strong> and Outlook inbox</li>
              <li><strong>1Password</strong>, our company password manager</li>
              <li><strong>NordLayer VPN</strong></li>
              <li><strong>Slack</strong>, a messaging app &amp; our hub of day-to-day communication</li>
              <li>Completion of important <strong>Security Training</strong></li></ol>
          <p><strong>Day two</strong></p>
          <ol start="7"><li><strong>Atlassian</strong></li>
              <li><strong>Airtable</strong></li>
              <li>Accessing any other accounts provisioned <strong>via Microsoft</strong></li>
              <li>Checking your email for <strong>invites</strong> to any other accounts your team might use</li></ol>
          <p>Once we finish these steps we'll be ready for onboarding!</p>`,
    cta:"Let's begin!" },

  /* ---------- SECTION 1 — Laptop password ---------- */
  { id:"pw-intro", section:1, secTitle:"New Laptop Password", cover:true,
    heading:"New Laptop Password",
    img:{file:"04-macbook.png", label:"MacBook laptop photo"},
    body:`<p>Let's replace your default laptop password with something <strong>unique</strong> and <strong>secure</strong>. We'll cover some guidelines for secure password creation, then show you how to update it in MacOS or Windows.</p>`,
    cta:"Continue" },

  { id:"pw-secure", section:1, secTitle:"New Laptop Password",
    heading:"What makes a password secure?",
    body:`<p>Secure passwords are crucial to protecting your accounts and information. Please follow these rules for any passwords you create:</p>
          <p><strong>1. Create a long password</strong>, ideally 16 characters, that is made up of unique, unrelated words (e.g. solarium-nutty-instep-banana)</p>
          <p><strong>2. Create a unique password</strong> that is not used for any other logins. Do not re-use this password for more than one login</p>
          <p><strong>3. Avoid common words</strong>, phrases, or common number substitutions (e.g. Aw3s0m3!)</p>
          <p>Some services may require the use of special characters (e.g. ?, !, $, %) as well, but length and uniqueness are the most important factors for a secure password.</p>`,
    cta:"Let's see an example" },

  { id:"pw-examples", section:1, secTitle:"New Laptop Password",
    heading:"Password examples",
    body:`<p>An example of a bad vs. good password can be seen by entering the two example passwords into this site:</p>
          <p><a href="https://www.security.org/how-secure-is-my-password/" target="_blank" rel="noopener">Security.org – How secure is my password?</a></p>
          <p><strong>Aw3s0m3!</strong> – will take a computer 8 hours to crack</p>
          <p><strong>solarium-nutty-instep-banana</strong> – will take a computer <em>1 octillion years</em> to crack</p>
          <p>Hopefully that makes it clear why longer passwords are better. Now let's update our laptop password!</p>`,
    cta:"Continue" },

  { id:"pw-type", section:1, secTitle:"New Laptop Password",
    heading:"What type of laptop are you using?",
    body:``,
    choices:[
      {key:"A", label:"Mac", action:"goto", to:"pw-mac"},
      {key:"B", label:"Windows", action:"goto", to:"pw-win"}
    ]},

  { id:"pw-mac", section:1, secTitle:"New Laptop Password",
    heading:"Update your laptop password (Mac)",
    body:`<ol><li>Click the <strong>Apple icon</strong> in the top-left of the screen</li>
             <li>Navigate to <strong>System Settings → Users &amp; Groups</strong></li>
             <li>Click the ⓘ next to your name and then <strong>Change</strong> next to Password.</li></ol>`,
    img:{file:"07-mac-users-groups.png", label:"Mac System Settings — Users & Groups"},
    continueTo:"m365-intro",
    choices:[
      {key:"A", label:"Password updated! Let's continue", action:"advance"},
      {key:"B", label:"I need some help", action:"help"}
    ]},

  { id:"pw-win", section:1, secTitle:"New Laptop Password",
    heading:"Update your laptop password (Windows)",
    body:`<ol><li>Press <strong>Ctrl + Alt + Delete</strong></li>
             <li>Choose <strong>Change a password</strong></li>
             <li>Enter your current password, then your new secure password twice, and confirm.</li></ol>`,
    img:{file:"07-windows-password.png", label:"Windows — Change a password screen"},
    continueTo:"m365-intro",
    choices:[
      {key:"A", label:"Password updated! Let's continue", action:"advance"},
      {key:"B", label:"I need some help", action:"help"}
    ]},

  /* ---------- SECTION 2 — Microsoft 365 ---------- */
  { id:"m365-intro", section:2, secTitle:"Microsoft 365", cover:true,
    heading:"Your Intus Microsoft 365 account and Outlook inbox",
    body:`<p>Intus Care uses Microsoft 365 for company email, shared calendars, and file sharing. You'll also use your Microsoft 365 account to access other important applications.</p>
          <p>Let's get logged in to your company Microsoft 365 account!</p>`,
    cta:"M365 Setup" },

  { id:"m365-2fa", section:2, secTitle:"Microsoft 365",
    heading:"First, a note on 2-step authentication (also known as 2FA)",
    body:`<p>2-step authentication is an essential security feature to avoid having a single point of failure if an account is compromised. <strong>This step is required</strong>, and if skipped you will get locked out of your Microsoft 365 account in the near future.</p>
          <p>In general with any app or software we use, setting up 2FA is highly encouraged.</p>`,
    cta:"I understand" },

  { id:"m365-activate", section:2, secTitle:"Microsoft 365",
    heading:"Activate Microsoft 365 and set up 2-step authentication!",
    body:`<p><strong>1.</strong> In your web browser, go to <a href="https://portal.office.com" target="_blank" rel="noopener">portal.office.com</a> and sign in with the credentials in your welcome email.</p>
          <div class="note">Your <strong>username</strong> and <strong>temporary password</strong> were sent to you in your day-one welcome email. Can't find it? Message the helpdesk at ${CONFIG.helpdeskSlack}.</div>
          <p>You will be prompted to <strong>change your password</strong> the first time you sign in — remember the password guidelines from earlier!</p>
          <p>Once you've changed your password, you should be prompted to set up <strong>two-step authentication</strong>. If you don't receive the prompt, you can do this here: <a href="https://mysignins.microsoft.com/security-info" target="_blank" rel="noopener">mysignins.microsoft.com/security-info</a></p>
          <p>You can choose either your <strong>Phone Number</strong> or the <strong>Microsoft Authenticator app</strong>, available in both the Apple App Store and Google Play Store.</p>`,
    choices:[
      {key:"A", label:"2FA is enabled, let's continue", action:"advance"},
      {key:"B", label:"I need some help", action:"help"}
    ]},

  /* ---------- SECTION 3 — 1Password ---------- */
  { id:"op-intro", section:3, secTitle:"1Password", cover:true,
    heading:"1Password, our company password manager",
    img:{file:"12-1password-logo.png", label:"1Password logo"},
    body:`<p>A password manager makes it easy to create, save, and share passwords securely. We'll explain how to activate your 1Password account, disable Chrome's password manager, and share some helpful tips.</p>`,
    cta:"Continue" },

  { id:"op-about", section:3, secTitle:"1Password",
    heading:"About your 1Password account",
    body:`<p>1Password will create, save, and auto-fill secure passwords for you. Each time it does this, it will ask for you to log in using your Microsoft credentials, so you only need to remember one password for everything.</p>
          <p><strong>Please do not use any other password managers (such as your own personal password manager, or Chrome's inbuilt password manager) to store your company passwords.</strong> We'll show you how to deactivate Chrome's password manager after you set up your 1Password account.</p>`,
    cta:"Got it, continue" },

  { id:"op-activate", section:3, secTitle:"1Password",
    heading:"1Password Activation",
    body:`<p>Check your inbox for an invite, then follow the steps in the email to create your account!</p>
          <p><em>Please note</em> – once you accept your invitation, an administrator will need to approve your account, which may take a short period of time.</p>`,
    choices:[
      {key:"A", label:"Account created!", action:"advance"},
      {key:"B", label:"I need some help", action:"help"}
    ]},

  { id:"op-using", section:3, secTitle:"1Password",
    heading:"Using 1Password",
    body:`<p>There are a variety of options for using 1Pass and you can choose what works best for you. The Chrome extension is great if you only want to use 1Pass in your browser, while the desktop app can manage passwords for multiple applications.</p>
          <p class="links">
            <a href="https://chromewebstore.google.com/detail/1password-%E2%80%93-password-mana/aeblfdkhhhdcdjpifhhbdiojplfjncoa" target="_blank" rel="noopener">1Pass Chrome Extension</a>
            <a href="https://1password.com/downloads/mac/" target="_blank" rel="noopener">1Pass Desktop App (Mac)</a>
            <a href="https://1password.com/downloads/windows" target="_blank" rel="noopener">1Pass Desktop App (Windows)</a>
          </p>
          <p>1Pass also has mobile apps available in the Apple and Google Play stores.</p>
          <p>Lastly, you can log into <a href="https://intuscare.1password.com/signin" target="_blank" rel="noopener">intuscare.1password.com/signin</a> and access saved passwords through your browser.</p>`,
    cta:"Continue" },

  { id:"op-chrome", section:3, secTitle:"1Password",
    heading:"Turn off Chrome password manager",
    body:`<p>If you are using Google Chrome, let's deactivate Chrome's built-in password manager so 1Password can take over. (If you're not using Chrome, skip this step).</p>
          <p><strong>Note:</strong> if you already installed the Chrome extension for 1pass, you can skip this step.</p>
          <p><strong>1.</strong> In your Chrome browser bar, type or paste: <span class="mono">chrome://password-manager/settings</span></p>
          <p><strong>2.</strong> Deactivate the <strong>Offer to save passwords and passkeys</strong> and <strong>Sign in automatically</strong> features (if they are not already deactivated).</p>`,
    img:{file:"16-chrome-settings.png", label:"Chrome password settings"},
    cta:"Continue" },

  { id:"op-new", section:3, secTitle:"1Password",
    heading:"New to 1Pass?",
    body:`<p>Here are some quick start guides to get familiar with using a password manager:</p>
          <p class="links">
            <a href="https://support.1password.com/getting-started-mac/" target="_blank" rel="noopener">1Password – Getting started on Mac</a>
            <a href="https://support.1password.com/getting-started-windows/" target="_blank" rel="noopener">1Password – Getting started on Windows</a>
            <a href="https://support.1password.com/getting-started-browser/" target="_blank" rel="noopener">1Password – Getting started in your Browser</a>
          </p>
          <p>💡 <em>Tip: bookmark these in your browser so you can read or refer to them later!</em></p>`,
    cta:"Continue" },

  /* ---------- SECTION 4 — NordLayer ---------- */
  { id:"nl-intro", section:4, secTitle:"NordLayer VPN", cover:true,
    heading:"NordLayer VPN",
    body:`<p>You've been assigned a NordLayer VPN license. Please follow the instructions in the following slides carefully to set up your NordLayer account.</p>
          <p>If you run into problems at any point during NordLayer setup, you can reach out to the helpdesk at ${CONFIG.helpdeskSlack} or <a href="mailto:${CONFIG.helpdeskEmail}">${CONFIG.helpdeskEmail}</a>.</p>`,
    cta:"Continue" },

  { id:"nl-download", section:4, secTitle:"NordLayer VPN",
    heading:"Download NordLayer",
    body:`<p><strong>1.</strong> Click <a href="https://nordlayer.com/download/" target="_blank" rel="noopener">here</a> to <strong>download</strong> NordLayer VPN</p>
          <p><em>Make sure to choose the correct version – Windows or MacOS, depending on your laptop type</em></p>
          <p><strong>2.</strong> When the download is complete, install and launch NordLayer.</p>
          <p><strong>3.</strong> When asked for your Organization ID, enter <strong>"intus-care"</strong></p>`,
    img:{file:"19-nordlayer-orgid.png", label:"NordLayer — Organization ID = intus-care"},
    cta:"Next" },

  { id:"nl-login", section:4, secTitle:"NordLayer VPN",
    heading:"Logging in to NordLayer",
    body:`<p><strong>3.</strong> When you reach the login page, click on <strong>Entra ID</strong> – this will allow you log in using your Microsoft 365 credentials.</p>
          <p>If you run into any issues setting up, let us know at ${CONFIG.helpdeskSlack} or <a href="mailto:${CONFIG.helpdeskEmail}">${CONFIG.helpdeskEmail}</a>!</p>`,
    img:{file:"20-entra-id.png", label:"NordLayer — Entra ID login button"},
    cta:"All set with NordLayer!" },

  /* ---------- SECTION 5 — Slack ---------- */
  { id:"slack-intro", section:5, secTitle:"Slack", cover:true,
    heading:"Slack, our hub of day-to-day communication",
    img:{file:"21-slack-logo.png", label:"Slack logo"},
    body:`<p>Our go-to messaging app for many years, Slack is where we do most of our internal communication on a daily basis. First we'll create a Slack account and join the Intus Care workspace. You can then choose whether to use Slack in your web browser or the desktop app (pre-installed for you).</p>`,
    cta:"Continue" },

  { id:"slack-create", section:5, secTitle:"Slack",
    heading:"Create your Slack account and join the Intus Care workspace",
    body:`<p>Check your email inbox for an invite to Slack, and follow the link provided to get your account set up!</p>
          <p>You can also access Slack via the 'waffle' button from your Microsoft Outlook inbox, located in the top left corner (see the adjacent image).</p>`,
    img:{file:"22-m365-launcher-slack.png", label:"Microsoft 365 app launcher — Slack highlighted"},
    choices:[
      {key:"A", label:"Done! Let's continue", action:"advance"},
      {key:"B", label:"I need some help", action:"help"}
    ]},

  { id:"slack-open", section:5, secTitle:"Slack",
    heading:"Opening the Slack App",
    body:`<p>The Slack desktop app is already installed on your laptop.</p>
          <p>With Slack open in your browser, click on <strong>Intus Care → Open the desktop app</strong> in the top-left of the window.</p>

/* ============================================================
   ENGINE — you shouldn't need to edit below here
   ============================================================ */
const byId = Object.fromEntries(STEPS.map(s=>[s.id,s]));
const idx  = id => STEPS.findIndex(s=>s.id===id);
let history = [];          // visited ids (for Back)
let current = "welcome";

const cardEl = document.getElementById("card");
const eyebrowEl = document.getElementById("eyebrow");
const barEl = document.getElementById("bar");

function imgFallback(el){
  const d = document.createElement("div");
  d.className = "shot-ph";
  d.innerHTML = `<span class="cam">🖼️</span>${el.dataset.label}
    <small>Add file <code>images/${el.dataset.file}</code> to this repo and it'll appear here</small>`;
  el.replaceWith(d);
}

function render(step){
  // eyebrow / top bar
  if(step.section && !step.cover){
    eyebrowEl.className = "eyebrow";
    eyebrowEl.innerHTML = `<span class="num">${step.section}</span>${step.secTitle}`;
  } else {
    eyebrowEl.className = "eyebrow hidden";
    eyebrowEl.innerHTML = "";
  }
  // progress
  barEl.style.width = ((idx(step.id))/(STEPS.length-1)*100).toFixed(1) + "%";

  let html = "";
  if(step.done){
    html += `<div class="done-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>`;
  }
  const tag = step.h===1 ? "h1" : "h2";
  const badge = (step.cover && step.section) ? `<span class="cover-badge">${step.section}</span>` : "";
  html += `<${tag}>${badge}${step.heading}</${tag}>`;
  if(step.body) html += `<div class="body">${step.body}</div>`;
  if(step.img){
    html += `<div class="shotwrap"><img class="shot" src="images/${step.img.file}"
      data-file="${step.img.file}" data-label="${step.img.label}" alt="${step.img.label}"
      onerror="imgFallback(this)"></div>`;
  }

  if(step.choices){
    html += `<div class="opts">`;
    step.choices.forEach((c,i)=>{
      html += `<button class="opt${c.action==='help'?' ghost':''}" data-i="${i}"><span class="key">${c.key}</span>${c.label}</button>`;
    });
    html += `</div>`;
    html += `<div class="actions"><button class="btn back${history.length?'':' hidden'}" id="backBtn">← Back</button></div>`;
    html += `<div class="hint">Press <kbd>A</kbd> or <kbd>B</kbd> to choose</div>`;
  } else {
    html += `<div class="actions">
      <button class="btn back${history.length?'':' hidden'}" id="backBtn">← Back</button>
      <button class="btn" id="nextBtn">${step.cta||'Continue'}</button></div>`;
    html += `<div class="hint">Press <kbd>Enter</kbd> to continue</div>`;
  }

  cardEl.innerHTML = html;
  cardEl.style.animation="none"; void cardEl.offsetWidth; cardEl.style.animation="";

  const nb = document.getElementById("nextBtn");
  if(nb) nb.addEventListener("click", advance);
  const bb = document.getElementById("backBtn");
  if(bb) bb.addEventListener("click", back);
  cardEl.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>choose(step.choices[btn.dataset.i]));
  });
  (document.getElementById("nextBtn") || cardEl.querySelector(".opt"))?.focus();
  window.scrollTo({top:0});
}

function goTo(id){ history.push(current); current = id; render(byId[id]); }

function advance(){
  const step = byId[current];
  const nextId = step.continueTo || STEPS[idx(current)+1]?.id;
  if(nextId) goTo(nextId);
}
function choose(c){
  if(c.action==="help") return document.getElementById("overlay").classList.add("open");
  if(c.action==="goto") return goTo(c.to);
  if(c.action==="advance") return advance();
}
function back(){
  if(!history.length) return;
  current = history.pop();
  render(byId[current]);
}

/* keyboard */
document.addEventListener("keydown", e=>{
  if(document.getElementById("overlay").classList.contains("open")) return;
  const step = byId[current];
  if(e.key==="Enter" && !step.choices){ document.getElementById("nextBtn")?.click(); }
  if(step.choices){
    if(e.key.toLowerCase()==="a") cardEl.querySelector('.opt[data-i="0"]')?.click();
    if(e.key.toLowerCase()==="b") cardEl.querySelector('.opt[data-i="1"]')?.click();
  }
});

/* help modal contacts */
const mMail=document.getElementById("mMail");
mMail.textContent=CONFIG.helpdeskEmail; mMail.href="mailto:"+CONFIG.helpdeskEmail;
document.getElementById("mSlack").textContent=CONFIG.helpdeskSlack;
document.getElementById("overlay").addEventListener("click",e=>{
  if(e.target.id==="overlay") e.currentTarget.classList.remove("open");
});

/* start */
render(byId[current]);
</script>
</body>
